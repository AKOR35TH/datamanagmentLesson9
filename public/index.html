<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Usuários</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>Sistema de Registro</h2>
            <p>Cadastro de Usuários</p>
        </div>
        
        <div class="form-container">
            <form method="POST" action="/submit" id="registrationForm">
                <div class="form-group">
                    <label for="name">Nome Completo:</label>
                    <input type="text" id="name" name="name" class="form-control" required>
                </div>
                
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" class="form-control" required>
                </div>
                
                <button type="submit" class="btn">Registrar Usuário</button>
            </form>

            <div class="button-group">
                <a href="/users" class="btn secondary">Ver Usuários Cadastrados</a>
            </div>
        </div>
        
        <div class="footer">
            &copy; 2024 Sistema de Registro
        </div>
    </div>

    <script>
        document.getElementById('registrationForm').addEventListener('submit', function(e) {
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            
            if(!name || !email) {
                e.preventDefault();
                alert('Por favor, preencha todos os campos.');
                return;
            }
        });
    </script>
</body>
</html>
